name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Build iOS App (Unsigned)
        run: |
          # 设置项目变量
          SCHEME="tvbox"
          CONFIGURATION="Release"
          ARCHIVE_PATH="build/tvbox.xcarchive"
          EXPORT_PATH="build/exported"

          # 清理构建目录
          rm -rf build
          rm -f TVBox.ipa

          echo "Building iOS Archive (Unsigned)..."
          xcodebuild archive \
            -project tvbox.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "Exporting unsigned IPA..."
          mkdir -p "$EXPORT_PATH"

          # 导出未签名的 IPA
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions-Unsigned.plist \
            -exportPath "$EXPORT_PATH" \
            -allowProvisioningUpdates

          # 查找并复制 IPA 文件
          IPA_FILE=$(find "$EXPORT_PATH" -name "*.ipa" | head -n 1)
          if [ -n "$IPA_FILE" ]; then
            cp "$IPA_FILE" ./TVBox-Unsigned.ipa
            echo "✅ Build completed! Generated: TVBox-Unsigned.ipa"
          else
            echo "❌ Failed to find .ipa file in export directory"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-Unsigned-IPA
          path: TVBox-Unsigned.ipa
          retention-days: 30
