name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Verify Xcode Installation
        run: |
          echo "Current Xcode version:"
          xcodebuild -version

          echo -e "\nXcode location:"
          xcode-select -p

          echo -e "\nAvailable Xcode installations:"
          ls -la /Applications/ | grep -i xcode

      - name: Install iOS Platform
        run: |
          # 安装 iOS 平台 SDK
          sudo xcodebuild -runFirstLaunch

          # 获取正确的 Xcode 路径
          XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          echo "Using Xcode at: $XCODE_PATH"

          # 检查可用的 SDK
          echo "Checking available SDKs..."
          xcodebuild -showsdks

          echo "Downloading iOS platform..."
          xcodebuild -downloadPlatform iOS || true

          # 等待平台安装完成
          sleep 10

          echo "Verifying iOS SDK installation..."
          xcodebuild -showsdks | grep -i "ios" || echo "iOS SDK not found, but continuing..."

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Debug - Show available destinations
        run: |
          echo "Available destinations for tvbox scheme:"
          xcodebuild -project tvbox.xcodeproj -scheme tvbox -showDestinations

          echo -e "\nAvailable SDKs:"
          xcodebuild -showsdks

      - name: Build iOS App (Unsigned)
        run: |
          # 设置项目变量
          SCHEME="tvbox"
          CONFIGURATION="Release"
          ARCHIVE_PATH="build/tvbox.xcarchive"
          APP_PATH="build/tvbox.xcarchive/Products/Applications/TVBox.app"

          # 清理构建目录
          rm -rf build
          rm -f TVBox-Unsigned.ipa

          echo "Building iOS Archive (Unsigned)..."
          xcodebuild archive \
            -project tvbox.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "Creating unsigned IPA..."
          # 创建 IPA 包结构
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/

          # 创建未签名的 IPA
          cd build
          zip -r ../TVBox-Unsigned.ipa Payload
          cd ..

          if [ -f "TVBox-Unsigned.ipa" ]; then
            echo "✅ Build completed! Generated: TVBox-Unsigned.ipa"
            ls -lh TVBox-Unsigned.ipa
          else
            echo "❌ Failed to create IPA file"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-Unsigned-IPA
          path: TVBox-Unsigned.ipa
          retention-days: 30
